<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Punk Records Inference banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d6a"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <!-- vinyl -->
  <circle cx="150" cy="150" r="90" fill="#111" stroke="#333" stroke-width="2"/>
  <circle cx="150" cy="150" r="70" fill="none" stroke="#222" stroke-width="1"/>
  <circle cx="150" cy="150" r="50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="150" cy="150" r="32" fill="#c4004f"/>
  <circle cx="150" cy="150" r="10" fill="#0d0d0d"/>
  <!-- title -->
  <text x="280" y="130" font-family="ui-sans-serif, system-ui, sans-serif" font-size="52" font-weight="700" fill="#fff">Punk Records Inference</text>
  <text x="280" y="185" font-family="ui-monospace, monospace" font-size="24" fill="url(#accent)">KV-state persistence for vLLM</text>
  <text x="280" y="230" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#888">capture · resume · .nls · BYOC · local-first</text>
  <!-- KV blocks -->
  <rect x="980" y="80" width="60" height="40" rx="4" fill="#00d4aa" opacity="0.85"/>
  <rect x="980" y="130" width="60" height="40" rx="4" fill="#00b894" opacity="0.65"/>
  <rect x="980" y="180" width="60" height="40" rx="4" fill="#009874" opacity="0.45"/>
  <text x="1010" y="250" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#666">.nls</text>
</svg>
